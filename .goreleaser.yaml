version: 2
project_name: warrant

builds:
  - id: warrant
    main: ./cmd/server
    binary: warrant
    goos: [linux, darwin]
    goarch: [amd64, arm64]
  - id: warrant-git
    main: ./cmd/warrant-git
    binary: warrant-git
    goos: [linux, darwin]
    goarch: [amd64, arm64]
  - id: warrant-mcp
    main: ./cmd/mcp
    binary: warrant-mcp
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: warrant
    ids: [warrant]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: warrant-git
    ids: [warrant-git]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: warrant-mcp
    ids: [warrant-mcp]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  github:
    owner: '{{ envOrDefault "GITHUB_REPOSITORY_OWNER" "matt0x6f" }}'
    name: warrant
  name_template: "{{ .Tag }}"
