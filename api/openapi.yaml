openapi: 3.0.3
info:
  title: Warrant API
  description: REST API for Warrant ticketing (orgs, projects, tickets, reviews, queue).
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local
paths:
  /healthz:
    get:
      operationId: GetHealthz
      summary: Liveness/readiness
      responses:
        "200":
          description: OK
  /me/stats:
    get:
      operationId: GetMeStats
      summary: Lifetime stats for the authenticated agent (tickets created, reviews approved/rejected). For gamification.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeStats'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /me/stats/history:
    get:
      operationId: GetMeStatsHistory
      summary: Daily activity counts for the last N days (for activity graph). Oldest day first.
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          description: Number of days (default 14, max 90).
          schema:
            type: integer
            default: 14
            minimum: 1
            maximum: 90
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeStatsHistory'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /orgs:
    get:
      operationId: ListOrgs
      summary: List organizations for the authenticated user (OAuth required)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    post:
      operationId: CreateOrg
      summary: Create organization (auth required)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /orgs/{orgID}:
    get:
      operationId: GetOrg
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /orgs/{orgID}/projects:
    get:
      operationId: ListProjectsByOrg
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: Filter by project status; default active.
          schema:
            type: string
            enum: [active, closed, all]
            default: active
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      operationId: CreateProject
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}:
    get:
      operationId: GetProject
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    patch:
      operationId: UpdateProject
      summary: Update project (e.g. set status to active or closed)
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        "400":
          description: Bad request (e.g. invalid status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}/work-streams:
    get:
      operationId: ListWorkStreams
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status; default active.
          schema:
            type: string
            enum: [active, closed, all]
            default: active
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkStream'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    post:
      operationId: CreateWorkStream
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkStreamRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkStream'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}/work-streams/{workStreamID}:
    get:
      operationId: GetWorkStream
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: workStreamID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkStream'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    patch:
      operationId: UpdateWorkStream
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: workStreamID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkStreamRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkStream'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}/tickets:
    get:
      operationId: ListTickets
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: work_stream_id
          in: query
          description: Filter by work stream.
          schema:
            type: string
        - name: state
          in: query
          description: Filter by ticket state.
          schema:
            type: string
            enum: [pending, claimed, executing, awaiting_review, done, blocked, needs_human, failed]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    post:
      operationId: CreateTicket
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}:
    get:
      operationId: GetTicket
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    patch:
      operationId: UpdateTicket
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketRequest'
      responses:
        "204":
          description: No content
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}/reviews:
    get:
      operationId: ListPendingReviews
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingReviewsResponse'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/reviews:
    post:
      operationId: CreateReview
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/trace:
    get:
      operationId: GetTrace
      summary: Execution trace (steps logged by the agent while working)
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionTrace'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
    post:
      operationId: LogStep
      summary: Append a step to the execution trace (requires valid lease)
      security:
        - BearerAuth: []
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogStepRequest'
      responses:
        "204":
          description: No content
        "400":
          description: Bad request (e.g. missing lease_token or step.type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/transitions:
    post:
      operationId: TransitionTicket
      summary: Transition ticket state (e.g. start, submit, approve, reject)
      security:
        - BearerAuth: []
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad request (e.g. trigger required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /orgs/{orgID}/projects/{projectID}/git-notes/commits/{commitSha}:
    get:
      operationId: GetCommitNotes
      summary: Get git notes for a commit (requires repo_path query; server returns 501 if repo not accessible)
      security:
        - BearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: commitSha
          in: path
          required: true
          schema:
            type: string
        - name: repo_path
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: Note type (decision, trace, or intent); omit for all types
          schema:
            type: string
            enum: [decision, trace, intent]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitNotesResponse'
        "404":
          description: Not found (project or org mismatch)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "501":
          description: Not implemented (repo_path missing or not a git repo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedError'
  /orgs/{orgID}/projects/{projectID}/git-notes/log:
    get:
      operationId: GetGitNotesLog
      summary: List commits with notes (requires repo_path query; server returns 501 if repo not accessible)
      security:
        - BearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
        - name: projectID
          in: path
          required: true
          schema:
            type: string
        - name: repo_path
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          description: Note type (default decision)
          schema:
            type: string
            enum: [decision, trace, intent]
            default: decision
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitNotesLogResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "501":
          description: Not implemented (repo_path missing or not a git repo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedError'
  /projects/{projectID}/escalations:
    get:
      operationId: ListEscalations
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Escalation'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/escalations/{escalationID}/resolve:
    post:
      operationId: ResolveEscalation
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
        - name: escalationID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveEscalationRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /projects/{projectID}/queue/claim:
    post:
      operationId: ClaimTicket
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimResponseBody'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/lease/renew:
    post:
      operationId: RenewLease
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewLeaseRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenewLeaseResponseBody'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
  /tickets/{ticketID}/lease:
    delete:
      operationId: ReleaseLease
      parameters:
        - name: ticketID
          in: path
          required: true
          schema:
            type: string
        - name: lease_token
          in: query
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lease_token:
                  type: string
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StructuredError'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MeStats:
      type: object
      required: [tickets_created, reviews_approved, reviews_rejected]
      properties:
        tickets_created:
          type: integer
          description: Total tickets created by this agent
        reviews_approved:
          type: integer
          description: Total reviews approved by this agent
        reviews_rejected:
          type: integer
          description: Total reviews rejected by this agent
    MeStatsHistory:
      type: object
      required: [days, tickets_created, reviews_approved, reviews_rejected]
      properties:
        days:
          type: array
          items:
            type: string
            format: date
          description: Date strings (YYYY-MM-DD) oldest first
        tickets_created:
          type: array
          items:
            type: integer
          description: Ticket count per day
        reviews_approved:
          type: array
          items:
            type: integer
        reviews_rejected:
          type: array
          items:
            type: integer
    StructuredError:
      type: object
      required: [error, code, retriable]
      properties:
        error:
          type: string
        code:
          type: string
          enum: [lease_expired, unauthorized, not_found, conflict, invalid_input, forbidden, internal, not_implemented, project_closed]
        retriable:
          type: boolean
    NotImplementedError:
      type: object
      description: Returned when server cannot access repo (e.g. git-notes without repo_path)
      properties:
        error:
          type: string
        code:
          type: string
          enum: [not_implemented]
    LogStepRequest:
      type: object
      required: [lease_token, step]
      properties:
        lease_token:
          type: string
        step:
          $ref: '#/components/schemas/TraceStepInput'
    TraceStepInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [tool_call, observation, thought, error]
        payload:
          type: object
    TransitionRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
        actor_id:
          type: string
        actor:
          type: string
          enum: [human, agent, system]
        payload:
          type: object
    CommitNotesResponse:
      type: object
      properties:
        commit_sha:
          type: string
        notes:
          type: object
          additionalProperties:
            type: string
    GitNotesLogResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/GitNotesLogEntry'
    GitNotesLogEntry:
      type: object
      properties:
        commit_sha:
          type: string
        ref:
          type: string
        body:
          type: string
    Org:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
    CreateOrgRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
    Project:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        name:
          type: string
        slug:
          type: string
        repo_url:
          type: string
        tech_stack:
          type: array
          items:
            type: string
        context_pack:
          type: object
        status:
          type: string
          enum: [active, closed]
          description: active (default) or closed; list endpoints default to active only.
        created_at:
          type: string
          format: date-time
    UpdateProjectRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, closed]
        name:
          type: string
          description: Project display name.
        slug:
          type: string
