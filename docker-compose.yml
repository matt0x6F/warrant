services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: warrant
      POSTGRES_PASSWORD: warrant
      POSTGRES_DB: warrant
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warrant -d warrant"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  # Browser GitHub OAuth: set BASE_URL=http://localhost:8080 in .env so redirects match this port mapping (see .env.example).
  server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://warrant:warrant@postgres:5432/warrant?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
